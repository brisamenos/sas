<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MicroCred - Central de Backup SaaS</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #09090b; --surface: #18181b; --surface-border: #27272a;
      --primary: #10b981; /* Verde Backup */
      --primary-hover: #059669;
      --accent: #3b82f6; /* Azul Restaurar */
      --accent-hover: #2563eb;
      --text: #fafafa; --text-dim: #a1a1aa;
      --danger: #ef4444; --warning: #f59e0b;
      --radius: 12px; --transition: all 0.3s ease;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background: radial-gradient(circle at top center, #18181b 0%, #09090b 100%); 
      color: var(--text); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
    }
    
    .card {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 35px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--primary));
    }

    .header-icon {
      width: 56px; height: 56px; 
      background: rgba(255, 255, 255, 0.05); 
      color: var(--text);
      border-radius: 14px; 
      display: flex; align-items: center; justify-content: center; 
      margin: 0 auto 15px;
      border: 1px solid var(--surface-border);
    }

    h1 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 8px; letter-spacing: -0.5px; }
    p.subtitle { text-align: center; color: var(--text-dim); font-size: 13px; margin-bottom: 30px; line-height: 1.5; }

    .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .form-group input { 
      padding: 14px; border-radius: 8px; border: 1px solid var(--surface-border); 
      background: #09090b; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 14px; 
      transition: var(--transition); outline: none; width: 100%; 
    }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }

    .btn { 
      width: 100%; padding: 14px; border-radius: 8px; border: none; 
      font-weight: 700; font-size: 14px; cursor: pointer; transition: var(--transition); 
      display: flex; align-items: center; justify-content: center; gap: 10px; 
    }
    .btn-primary { background: rgba(16, 185, 129, 0.1); color: var(--primary); border: 1px solid rgba(16, 185, 129, 0.3); }
    .btn-primary:hover { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
    
    .btn-accent { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.3); }
    .btn-accent:hover { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
    
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* File Input Estilizado */
    .file-input-wrapper { position: relative; margin-bottom: 15px; }
    .file-input-wrapper input[type="file"] {
      width: 100%; padding: 12px; background: rgba(255,255,255,0.02); border: 1px dashed var(--surface-border); 
      color: var(--text-dim); border-radius: 8px; cursor: pointer; font-size: 12px; font-family: 'JetBrains Mono', monospace;
    }
    .file-input-wrapper input[type="file"]::file-selector-button {
      background: var(--surface-border); color: var(--text); border: none; padding: 6px 12px; border-radius: 4px; margin-right: 10px; cursor: pointer; font-weight: 600;
    }

    /* Divisórias das áreas */
    .action-section { background: rgba(0,0,0,0.2); border: 1px solid var(--surface-border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .action-section h3 { font-size: 14px; margin-bottom: 15px; color: #fff; display: flex; align-items: center; gap: 8px; }

    /* Console de Log */
    .console-box {
      background: #000; border: 1px solid var(--surface-border); border-radius: 8px;
      padding: 15px; margin-top: 10px; height: 180px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #a1a1aa;
      display: flex; flex-direction: column; gap: 6px; display: none;
    }
    .log-line { margin: 0; line-height: 1.4; }
    .log-info { color: #3b82f6; }
    .log-success { color: var(--primary); }
    .log-error { color: var(--danger); }
    .log-warning { color: var(--warning); }

    #backupPanel { display: none; }
  </style>
</head>
<body>

<div class="card" id="loginPanel">
  <div class="header-icon">
    <svg style="width:28px;height:28px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
  </div>
  <h1>Cofre de Segurança</h1>
  <p class="subtitle">Acesso restrito para Extração e Restauração de Dados.</p>

  <div class="form-group">
    <label>Chave de Acesso (Admin)</label>
    <input type="password" id="admPass" placeholder="••••••••" onkeypress="if(event.key === 'Enter') login()">
  </div>
  <button class="btn btn-primary" onclick="login()" style="background: var(--primary); color: #000;">Autenticar Acesso</button>
</div>

<div class="card" id="backupPanel">
  <div class="header-icon" style="background: rgba(255,255,255,0.05);">
    <svg style="width:28px;height:28px;color:var(--text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
  </div>
  <h1>Central de Dados SaaS</h1>
  <p class="subtitle">Gerencie os dados globais do sistema. A ordem e a integridade das tabelas são mantidas automaticamente.</p>

  <div class="action-section">
    <h3>
      <svg style="width:18px;height:18px;color:var(--primary);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
      1. Gerar Backup Completo
    </h3>
    <button class="btn btn-primary" id="btnIniciar" onclick="iniciarBackup()">
      Extrair Base de Dados (JSON)
    </button>
  </div>

  <div class="action-section">
    <h3>
      <svg style="width:18px;height:18px;color:var(--accent);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
      2. Restaurar Sistema
    </h3>
    <div class="file-input-wrapper">
      <input type="file" id="fileInput" accept=".json">
    </div>
    <button class="btn btn-accent" id="btnRestaurar" onclick="iniciarRestauracao()">
      Injetar Dados no Sistema
    </button>
  </div>

  <div class="console-box" id="consoleBox">
    <p class="log-line log-info">SISTEMA PRONTO. AGUARDANDO COMANDO...</p>
  </div>

  <button class="btn" style="background: transparent; color: var(--text-dim); margin-top: 10px; font-size: 13px;" onclick="location.reload()">Travar Cofre e Sair</button>
</div>

<script>
  // ==========================================
  // CONFIGURAÇÕES SUPABASE
  // ==========================================
  const SUPABASE_URL = 'https://iwuxqrjidsrsjwtbiycg.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_bmsS5bUWDAQVxIp0ovQtow_gWMauzwd';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Ordem estrita para garantir que as tabelas com dependências (como operacoes e parcelas)
  // são lidas e restauradas na sequência correta.
  const TABELAS_SISTEMA = [
    'usuarios_clientes', 
    'clientes', 
    'avalistas', 
    'micro_negocios', 
    'operacoes', 
    'parcelas', 
    'avaliacao_financeira', 
    'fluxo_caixa', 
    'renovacoes', 
    'historico_cobrancas', 
    'inadimplencia'
  ];

  // ==========================================
  // LÓGICA DE INTERFACE
  // ==========================================
  function login() {
    const pass = document.getElementById('admPass').value;
    if(pass === '123456') { 
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('backupPanel').style.display = 'block';
    } else {
      alert('Acesso negado. Senha incorreta.');
    }
  }

  function log(msg, type = '') {
    const consoleBox = document.getElementById('consoleBox');
    consoleBox.style.display = 'flex';
    const time = new Date().toLocaleTimeString('pt-PT');
    const p = document.createElement('p');
    p.className = `log-line ${type}`;
    p.textContent = `[${time}] > ${msg}`;
    consoleBox.appendChild(p);
    consoleBox.scrollTop = consoleBox.scrollHeight;
  }

  // ==========================================
  // FUNÇÃO: EXPORTAR (BACKUP)
  // ==========================================
  async function iniciarBackup() {
    const btn = document.getElementById('btnIniciar');
    const btnRes = document.getElementById('btnRestaurar');
    
    btn.disabled = true; btnRes.disabled = true;
    btn.textContent = 'A extrair dados...';
    document.getElementById('consoleBox').innerHTML = ''; // Limpa logs anteriores

    log('Iniciando rotina de Backup Geral...', 'log-info');
    
    let backupTotal = {
      meta: {
        tipo: 'Full_System_Dump',
        data_extracao: new Date().toISOString(),
        total_tabelas: TABELAS_SISTEMA.length
      },
      dados: {}
    };

    try {
      for (let i = 0; i < TABELAS_SISTEMA.length; i++) {
        const tabela = TABELAS_SISTEMA[i];
        log(`A descarregar: ${tabela}...`);
        
        // Puxa tudo. Limite alto para garantir que não corta dados.
        const { data, error } = await sb.from(tabela).select('*').limit(20000);
        
        if (error) {
          log(`Erro em ${tabela}: ${error.message}`, 'log-error');
          backupTotal.dados[tabela] = [];
        } else {
          log(`Sucesso! ${data.length} registos encontrados.`, 'log-success');
          backupTotal.dados[tabela] = data;
        }
      }

      log('A compilar e formatar JSON...', 'log-info');

      const jsonString = JSON.stringify(backupTotal, null, 2);
      const blob = new Blob([jsonString], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = `MicroCred_BackupGeral_${new Date().toISOString().slice(0,10)}.json`;
      
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      log('BACKUP CONCLUÍDO COM SUCESSO!', 'log-success');
      
    } catch (e) {
      log(`FALHA CRÍTICA: ${e.message}`, 'log-error');
    } finally {
      btn.textContent = 'Extrair Base de Dados (JSON)';
      btn.disabled = false; btnRes.disabled = false;
    }
  }

  // ==========================================
  // FUNÇÃO: IMPORTAR (RESTAURAR)
  // ==========================================
  async function iniciarRestauracao() {
    const fileInput = document.getElementById('fileInput');
    const btnRes = document.getElementById('btnRestaurar');
    const btnBac = document.getElementById('btnIniciar');

    if (!fileInput.files.length) { 
      alert('Por favor, selecione um ficheiro .json primeiro.'); 
      return; 
    }

    if (!confirm('ATENÇÃO: A restauração irá sobrescrever dados existentes que tenham o mesmo ID. Deseja prosseguir?')) {
      return;
    }

    btnRes.disabled = true; btnBac.disabled = true;
    btnRes.textContent = 'A injetar dados...';
    document.getElementById('consoleBox').innerHTML = '';

    try {
      log('A ler ficheiro selecionado...', 'log-info');
      const file = fileInput.files[0];
      const text = await file.text();
      const backup = JSON.parse(text);

      if (!backup.dados || backup.meta?.tipo !== 'Full_System_Dump') {
        throw new Error("O ficheiro não é um backup válido do sistema MicroCred.");
      }

      log('Ficheiro validado. Iniciando injeção no Supabase...', 'log-success');

      // A ordem aqui é estritamente necessária (TABELAS_SISTEMA já está ordenado)
      for (const tabela of TABELAS_SISTEMA) {
        const linhas = backup.dados[tabela];
        
        if (linhas && linhas.length > 0) {
          log(`A injetar ${linhas.length} registo(s) na tabela '${tabela}'...`, 'log-warning');
          
          // Faz a inserção ou atualização em blocos
          const { error } = await sb.from(tabela).upsert(linhas);
          
          if (error) {
            log(`ERRO NA TABELA ${tabela}: ${error.message}`, 'log-error');
            // Não paramos o loop inteiro para tentar salvar o resto, mas avisamos o erro.
          } else {
            log(`Tabela '${tabela}' restaurada!`, 'log-success');
          }
        } else {
          log(`Tabela '${tabela}' estava vazia. Avançando...`);
        }
      }

      log('=====================================', 'log-success');
      log('RESTAURAÇÃO DO SISTEMA CONCLUÍDA!', 'log-success');
      alert('Os dados foram restaurados no banco de dados com sucesso.');

    } catch (err) {
      log(`FALHA DE RESTAURAÇÃO: ${err.message}`, 'log-error');
      alert('Falha ao restaurar: ' + err.message);
    } finally {
      btnRes.textContent = 'Injetar Dados no Sistema';
      btnRes.disabled = false; btnBac.disabled = false;
      fileInput.value = ''; // Limpa o input
    }
  }
</script>
</body>
</html>
